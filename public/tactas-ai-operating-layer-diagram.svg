  <text x="800" y="147" text-anchor="middle" class="headline ink">Connect every business tool to one managed AI operating layer.</text>
  <text x="800" y="190" text-anchor="middle" class="caption muted">Turn company knowledge, live data, and connected tools into supervised business action.</text>

  <text x="172" y="244" class="zone faint">Business tools</text>
  <text x="713" y="244" class="zone faint">Managed AI operating layer</text>
  <text x="1195" y="244" class="zone faint">Business outcomes</text>

