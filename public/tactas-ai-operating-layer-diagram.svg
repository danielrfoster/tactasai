<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Tactas AI managed AI operating layer diagram</title>
  <desc id="desc">Business tools connect into one managed Tactas AI operating layer, which prepares controlled business outcomes for knowledge, data, tasks, teams, and outputs.</desc>
  <defs>
    <linearGradient id="hubFill" x1="620" y1="326" x2="980" y2="642" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="hubStroke" x1="620" y1="326" x2="980" y2="642" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="brandMark" x1="704" y1="390" x2="890" y2="518" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.22"/>
      <stop offset="0.56" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#07111F" flood-opacity="0.12"/>
    </filter>
    <filter id="smallShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#07111F" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #F7F9FC; }
      .ink { fill: #07111F; }
      .muted { fill: #475569; }
      .faint { fill: #64748B; }
      .eyebrow { font: 700 14px Manrope, Inter, system-ui, sans-serif; letter-spacing: 3px; text-transform: uppercase; }
      .headline { font: 800 46px Manrope, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .caption { font: 500 21px Manrope, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .zone { font: 800 13px Manrope, Inter, system-ui, sans-serif; letter-spacing: 2px; text-transform: uppercase; }
      .cardTitle { font: 800 18px Manrope, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .toolText { font: 700 15px Manrope, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .outcome { font: 800 21px Manrope, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .outcomeSub { font: 600 12px Manrope, Inter, system-ui, sans-serif; letter-spacing: 1.4px; text-transform: uppercase; }
      .hubTitle { font: 800 35px Manrope, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .hubSub { font: 700 17px Manrope, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .cap { font: 800 14px Manrope, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .flow { fill: none; stroke: #2563EB; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.34; }
      .flowCyan { fill: none; stroke: #06B6D4; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.42; }
      .flowViolet { fill: none; stroke: #7C3AED; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.30; }
    </style>
  </defs>

